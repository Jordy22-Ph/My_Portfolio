<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Messages</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--accent:#2cff7a;--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a38;--text-1:#f0f0f8;--text-2:#9898b8;--text-3:#5a5a7a;}
    body{background:var(--bg);color:var(--text-1);font-family:'Inter',sans-serif;min-height:100vh;}
    a{color:var(--accent);}

    /* GATE */
    #gate{display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .gate-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:340px;text-align:center;}
    .gate-box h2{font-size:18px;font-weight:700;margin-bottom:8px;}
    .gate-box p{font-size:13px;color:var(--text-3);margin-bottom:24px;}
    .gate-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text-1);outline:none;margin-bottom:12px;}
    .gate-box input:focus{border-color:var(--accent);}
    .gate-box button{width:100%;background:var(--accent);color:#080810;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:11px;cursor:pointer;}
    .gate-box button:hover{opacity:.88;}
    .err{color:#ff4455;font-size:13px;margin-top:10px;display:none;}

    /* PANEL */
    #panel{display:none;}
    .header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;}
    .header__logo{font-size:16px;font-weight:700;}
    .header__logo span{color:var(--accent);}
    .header__back{font-size:13px;color:var(--text-3);text-decoration:none;}
    .header__back:hover{color:var(--accent);}

    .main{max-width:860px;margin:0 auto;padding:36px 24px;}
    .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .top-bar h1{font-size:22px;font-weight:700;}
    .badge{background:var(--accent-d,rgba(44,255,122,0.12));color:var(--accent);border:1px solid rgba(44,255,122,0.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;}

    .msg-list{display:flex;flex-direction:column;gap:14px;}
    .msg-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px 24px;transition:border-color .2s;}
    .msg-card:hover{border-color:rgba(44,255,122,0.3);}
    .msg-card__head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;}
    .msg-card__info{}
    .msg-card__name{font-size:15px;font-weight:700;color:var(--text-1);}
    .msg-card__email{font-size:13px;color:var(--accent);margin-top:2px;}
    .msg-card__date{font-size:12px;color:var(--text-3);white-space:nowrap;}
    .msg-card__body{font-size:14px;color:var(--text-2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}

    .empty{text-align:center;padding:60px 0;color:var(--text-3);font-size:15px;}
    .loading{text-align:center;padding:60px 0;color:var(--text-3);font-size:14px;}

    @media(max-width:600px){.msg-card__head{flex-direction:column;}.msg-card__date{align-self:flex-end;}}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="gate">
  <div class="gate-box">
    <h2>🔒 관리자 페이지</h2>
    <p>비밀번호를 입력하세요</p>
    <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">확인</button>
    <p class="err" id="pw-err">비밀번호가 틀렸습니다.</p>
  </div>
</div>

<!-- 관리 패널 -->
<div id="panel">
  <header class="header">
    <div class="header__logo">Subin<span>.</span> Admin</div>
    <a href="index.html" class="header__back">← 포트폴리오로 돌아가기</a>
  </header>
  <div class="main">
    <div class="top-bar">
      <h1>받은 메시지</h1>
      <span class="badge" id="count-badge">로딩 중…</span>
    </div>
    <div class="msg-list" id="msg-list">
      <div class="loading">메시지를 불러오는 중…</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* ── 비밀번호 변경은 여기서 ── */
const ADMIN_PASSWORD = 'subin2026';
/* ─────────────────────────── */

const firebaseConfig={apiKey:"AIzaSyBcFEt94vDv15NFaKloUXW94vSO7a9-3lo",authDomain:"subin-portfolio-1a5a2.firebaseapp.com",projectId:"subin-portfolio-1a5a2",storageBucket:"subin-portfolio-1a5a2.firebasestorage.app",messagingSenderId:"716285576647",appId:"1:716285576647:web:65c071ca6a35cf1f8045e2"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.checkPw=()=>{
  const val=document.getElementById('pw-input').value;
  if(val===ADMIN_PASSWORD){
    document.getElementById('gate').style.display='none';
    document.getElementById('panel').style.display='block';
    loadMessages();
  }else{
    document.getElementById('pw-err').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
};

async function loadMessages(){
  const list=document.getElementById('msg-list');
  const badge=document.getElementById('count-badge');
  try{
    const q=query(collection(db,'messages'),orderBy('createdAt','desc'));
    const snap=await getDocs(q);
    if(snap.empty){
      list.innerHTML='<div class="empty">아직 받은 메시지가 없습니다.</div>';
      badge.textContent='0건';
      return;
    }
    badge.textContent=snap.size+'건';
    list.innerHTML='';
    snap.forEach(doc=>{
      const d=doc.data();
      const date=d.createdAt?.toDate();
      const dateStr=date?date.toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'날짜 없음';
      const card=document.createElement('div');
      card.className='msg-card';
      card.innerHTML=`
        <div class="msg-card__head">
          <div class="msg-card__info">
            <div class="msg-card__name">${esc(d.name||'(이름 없음)')}</div>
            <div class="msg-card__email"><a href="mailto:${esc(d.email)}">${esc(d.email||'')}</a></div>
          </div>
          <div class="msg-card__date">${dateStr}</div>
        </div>
        <div class="msg-card__body">${esc(d.message||'')}</div>`;
      list.appendChild(card);
    });
  }catch(err){
    list.innerHTML='<div class="empty">불러오기 실패 — Firestore 규칙을 확인해주세요.</div>';
    badge.textContent='오류';
    console.error(err);
  }
}

function esc(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
